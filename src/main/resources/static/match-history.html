<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đấu - Cờ Caro Online Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1f2933;
            color: #f9fafb;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: #111827;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            color: white;
        }
        .btn-primary {
            background: #2563eb;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }
        .btn-secondary {
            background: #374151;
        }
        .btn-secondary:hover {
            background: #4b5563;
        }
        .filters {
            background: #111827;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .filter-group label {
            font-size: 14px;
            color: #e5e7eb;
        }
        .filter-group select, .filter-group input {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #374151;
            background: #020617;
            color: #f9fafb;
            font-size: 14px;
        }
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #111827;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 5px;
        }
        .stat-label {
            color: #9ca3af;
            font-size: 14px;
        }
        .matches-section {
            background: #111827;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #f9fafb;
        }
        .matches-list {
            display: grid;
            gap: 15px;
        }
        .match-card {
            background: #020617;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #2563eb;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .match-card:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .match-room {
            font-weight: bold;
            color: #f9fafb;
        }
        .match-date {
            color: #9ca3af;
            font-size: 14px;
        }
        .match-result {
            display: flex;
            gap: 20px;
        }
        .player-result {
            flex: 1;
            padding: 15px;
            background: #1f2933;
            border-radius: 8px;
            text-align: center;
        }
        .player-result.winner {
            background: #064e3b;
            border: 2px solid #10b981;
        }
        .player-result.loser {
            background: #7f1d1d;
            border: 2px solid #ef4444;
        }
        .player-name {
            font-weight: bold;
            margin-bottom: 5px;
            color: #f9fafb;
        }
        .player-role {
            font-size: 12px;
            color: #9ca3af;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #6b7280;
        }
        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                flex-direction: column;
                align-items: stretch;
            }
            .stats-summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📜 Lịch sử đấu</h1>
            <div>
                <a href="/lobby.html" class="btn btn-secondary">🏠 Lobby</a>
                <a href="/profile.html" class="btn btn-secondary">👤 Hồ sơ</a>
                <button onclick="logout()" class="btn btn-primary">Đăng xuất</button>
            </div>
        </header>

        <div class="filters">
            <div class="filter-group">
                <label>Lọc theo:</label>
                <select id="filterType" onchange="applyFilters()">
                    <option value="all">Tất cả</option>
                    <option value="win">Chỉ thắng</option>
                    <option value="loss">Chỉ thua</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Tìm kiếm phòng:</label>
                <input type="text" id="searchRoom" placeholder="Mã phòng..." oninput="applyFilters()">
            </div>
        </div>

        <div class="stats-summary" id="statsSummary">
            <div class="stat-card">
                <div class="stat-value" id="totalMatches">0</div>
                <div class="stat-label">Tổng trận</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalWins">0</div>
                <div class="stat-label">Thắng</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalLosses">0</div>
                <div class="stat-label">Thua</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="winRate">0%</div>
                <div class="stat-label">Tỷ lệ thắng</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="longestWinStreak">0</div>
                <div class="stat-label">Chuỗi thắng dài nhất</div>
            </div>
        </div>

        <div class="matches-section">
            <h2 class="section-title">Danh sách trận đấu</h2>
            <div id="matchesContent">
                <div class="loading">Đang tải...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8080";
        const username = localStorage.getItem("username");
        let allMatches = [];

        if (!username) {
            window.location.href = "/login.html";
        }

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("username");
            window.location.href = "/login.html";
        }

        async function loadMatchHistory() {
            try {
                const token = localStorage.getItem("token");
                if (!token) {
                    window.location.href = "/login.html";
                    return;
                }

                const res = await fetch(`${API_BASE}/api/profile/${username}`, {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                if (!res.ok) {
                    document.getElementById("matchesContent").innerHTML = `
                        <div class="empty-state">
                            <p>Không thể tải lịch sử đấu.</p>
                        </div>
                    `;
                    return;
                }

                const profile = await res.json();
                allMatches = profile.recentMatches || [];
                updateStats();
                applyFilters();
            } catch (e) {
                console.error("Error loading match history:", e);
                document.getElementById("matchesContent").innerHTML = `
                    <div class="empty-state">
                        <p>Lỗi kết nối server.</p>
                    </div>
                `;
            }
        }

        function updateStats() {
            const wins = allMatches.filter(m => m.winnerUsername === username).length;
            const losses = allMatches.filter(m => m.loserUsername === username).length;
            const total = allMatches.length;
            const winRate = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;

            // Tính chuỗi thắng dài nhất
            let longestStreak = 0;
            let currentStreak = 0;
            for (const match of allMatches) {
                if (match.winnerUsername === username) {
                    currentStreak++;
                    longestStreak = Math.max(longestStreak, currentStreak);
                } else {
                    currentStreak = 0;
                }
            }

            document.getElementById("totalMatches").textContent = total;
            document.getElementById("totalWins").textContent = wins;
            document.getElementById("totalLosses").textContent = losses;
            document.getElementById("winRate").textContent = winRate + "%";
            document.getElementById("longestWinStreak").textContent = longestStreak;
        }

        function applyFilters() {
            const filterType = document.getElementById("filterType").value;
            const searchRoom = document.getElementById("searchRoom").value.toLowerCase();

            let filtered = allMatches;

            if (filterType === "win") {
                filtered = filtered.filter(m => m.winnerUsername === username);
            } else if (filterType === "loss") {
                filtered = filtered.filter(m => m.loserUsername === username);
            }

            if (searchRoom) {
                filtered = filtered.filter(m => m.roomId.toLowerCase().includes(searchRoom));
            }

            renderMatches(filtered);
        }

        function renderMatches(matches) {
            const container = document.getElementById("matchesContent");
            
            if (matches.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Không có trận đấu nào phù hợp.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = matches.map(match => {
                const matchDate = new Date(match.playedAt).toLocaleString("vi-VN");
                const isWinner = match.winnerUsername === username;
                const opponent = isWinner ? match.loserUsername : match.winnerUsername;

                return `
                    <div class="match-card">
                        <div class="match-header">
                            <div class="match-room">Phòng: ${match.roomId}</div>
                            <div class="match-date">${matchDate}</div>
                        </div>
                        <div class="match-result">
                            <div class="player-result ${isWinner ? 'winner' : 'loser'}">
                                <div class="player-name">${match.winnerUsername}</div>
                                <div class="player-role">${match.winnerRole} - Thắng</div>
                            </div>
                            <div class="player-result ${!isWinner ? 'winner' : 'loser'}">
                                <div class="player-name">${match.loserUsername}</div>
                                <div class="player-role">Thua</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        loadMatchHistory();
    </script>
</body>
</html>
