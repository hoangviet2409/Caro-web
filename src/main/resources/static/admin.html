<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Cờ Caro Online Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f9fafb;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .card {
            background: #020617;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 8px;
            border-bottom: 1px solid #1f2937;
            text-align: left;
        }
        th {
            background: #111827;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🛠️ Admin Panel</h1>
        <div>
            <button class="btn btn-primary" onclick="loadStats()">Tải thống kê</button>
            <a href="/lobby.html" class="btn btn-primary">Quay lại Lobby</a>
        </div>
    </header>

    <div class="card">
        <div class="card-title">Thống kê nhanh</div>
        <div id="stats">Đang tải...</div>
    </div>

    <div class="card">
        <div class="card-title">Danh sách phòng đang mở</div>
        <table>
            <thead>
            <tr>
                <th>Phòng</th>
                <th>Người chơi X</th>
                <th>Người chơi O</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody id="roomsBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:8080";

    async function loadStats() {
        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "/login.html";
            return;
        }
        try {
            const res = await fetch(API_BASE + "/api/admin/stats", {
                headers: { "Authorization": "Bearer " + token }
            });
            if (!res.ok) {
                document.getElementById("stats").textContent = "Không có quyền xem (chỉ admin).";
                return;
            }
            const data = await res.json();
            document.getElementById("stats").textContent =
                `Số phòng đang mở: ${data.roomCount} | Tổng user: ${data.userCount}`;
        } catch (e) {
            document.getElementById("stats").textContent = "Lỗi tải thống kê.";
        }
    }

    async function loadRoomsAdmin() {
        const token = localStorage.getItem("token");
        if (!token) return;
        try {
            const res = await fetch(API_BASE + "/api/admin/rooms", {
                headers: { "Authorization": "Bearer " + token }
            });
            const body = document.getElementById("roomsBody");
            if (!res.ok) {
                body.innerHTML = "<tr><td colspan='5'>Không có quyền (chỉ admin).</td></tr>";
                return;
            }
            const rooms = await res.json();
            if (!rooms || rooms.length === 0) {
                body.innerHTML = "<tr><td colspan='5'>Không có phòng nào.</td></tr>";
                return;
            }
            body.innerHTML = rooms.map(r => {
                const status = r.full ? "Đang chơi" : (r.gameOver ? "Kết thúc" : "Chờ");
                return `
                    <tr>
                        <td>${r.roomId}</td>
                        <td>${r.playerXName || ""}</td>
                        <td>${r.playerOName || ""}</td>
                        <td>${status}</td>
                        <td><button class="btn btn-danger" onclick="closeRoom('${r.roomId}')">Đóng</button></td>
                    </tr>
                `;
            }).join("");
        } catch (e) {
            document.getElementById("roomsBody").innerHTML =
                "<tr><td colspan='5'>Lỗi tải danh sách phòng.</td></tr>";
        }
    }

    async function closeRoom(roomId) {
        const token = localStorage.getItem("token");
        if (!token) return;
        if (!confirm("Đóng phòng " + roomId + "?")) return;
        try {
            await fetch(API_BASE + "/api/admin/rooms/" + roomId, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });
            loadRoomsAdmin();
        } catch (e) {
            alert("Lỗi đóng phòng.");
        }
    }

    loadStats();
    loadRoomsAdmin();
</script>
</body>
</html>
