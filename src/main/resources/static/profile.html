<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ - Cờ Caro Online Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
        }
        .profile-info h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }
        .profile-info p {
            color: #666;
            font-size: 16px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }
        .matches-list {
            display: grid;
            gap: 15px;
        }
        .match-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .match-room {
            font-weight: bold;
            color: #333;
        }
        .match-date {
            color: #666;
            font-size: 14px;
        }
        .match-result {
            display: flex;
            gap: 20px;
        }
        .player-result {
            flex: 1;
            padding: 10px;
            background: white;
            border-radius: 8px;
            text-align: center;
        }
        .player-result.winner {
            background: #d4edda;
            border: 2px solid #28a745;
        }
        .player-result.loser {
            background: #f8d7da;
            border: 2px solid #dc3545;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👤 Hồ sơ người chơi</h1>
            <div>
                <a href="/lobby.html" class="btn btn-secondary">🏠 Lobby</a>
                <a href="/match-history.html" class="btn btn-secondary">📜 Lịch sử</a>
                <a href="/admin.html" class="btn btn-secondary">🛠️ Admin</a>
                <button onclick="logout()" class="btn btn-primary">Đăng xuất</button>
            </div>
        </header>

        <div id="profileContent" class="profile-card">
            <div class="loading">Đang tải thông tin...</div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8080";
        const username = localStorage.getItem("username");

        if (!username) {
            window.location.href = "/login.html";
        }

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("username");
            window.location.href = "/login.html";
        }

        async function loadProfile() {
            try {
                const token = localStorage.getItem("token");
                if (!token) {
                    window.location.href = "/login.html";
                    return;
                }

                const res = await fetch(`${API_BASE}/api/profile/${username}`, {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                if (!res.ok) {
                    document.getElementById("profileContent").innerHTML = `
                        <div class="loading">
                            <p>Không thể tải thông tin hồ sơ.</p>
                        </div>
                    `;
                    return;
                }

                const profile = await res.json();
                renderProfile(profile);
            } catch (e) {
                console.error("Error loading profile:", e);
                document.getElementById("profileContent").innerHTML = `
                    <div class="loading">
                        <p>Lỗi kết nối server.</p>
                    </div>
                `;
            }
        }

        function renderProfile(profile) {
            const avatarLetter = profile.username.charAt(0).toUpperCase();
            const winRate = profile.totalMatches > 0 ? profile.winRate.toFixed(1) : "0.0";

            document.getElementById("profileContent").innerHTML = `
                <div class="profile-header">
                    <div class="avatar">${avatarLetter}</div>
                    <div class="profile-info">
                        <h1>${profile.username}</h1>
                        <p>${profile.email}</p>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${profile.score}</div>
                        <div class="stat-label">Điểm ELO</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${profile.wins}</div>
                        <div class="stat-label">Thắng</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${profile.losses}</div>
                        <div class="stat-label">Thua</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${winRate}%</div>
                        <div class="stat-label">Tỷ lệ thắng</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${profile.totalMatches}</div>
                        <div class="stat-label">Tổng trận</div>
                    </div>
                </div>

                <h2 class="section-title">📜 Lịch sử đấu gần đây</h2>
                <div class="matches-list">
                    ${profile.recentMatches && profile.recentMatches.length > 0 
                        ? profile.recentMatches.map(match => {
                            const matchDate = new Date(match.playedAt).toLocaleString("vi-VN");
                            const isWinner = match.winnerUsername === profile.username;
                            return `
                                <div class="match-card">
                                    <div class="match-header">
                                        <div class="match-room">Phòng: ${match.roomId}</div>
                                        <div class="match-date">${matchDate}</div>
                                    </div>
                                    <div class="match-result">
                                        <div class="player-result ${isWinner ? 'winner' : 'loser'}">
                                            <div style="font-weight: bold; margin-bottom: 5px;">${match.winnerUsername}</div>
                                            <div style="font-size: 12px; color: #666;">${match.winnerRole} - Thắng</div>
                                        </div>
                                        <div class="player-result ${!isWinner ? 'winner' : 'loser'}">
                                            <div style="font-weight: bold; margin-bottom: 5px;">${match.loserUsername}</div>
                                            <div style="font-size: 12px; color: #666;">Thua</div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join("")
                        : '<div class="loading"><p>Chưa có trận đấu nào.</p></div>'
                    }
                </div>
            `;
        }

        loadProfile();
    </script>
</body>
</html>
