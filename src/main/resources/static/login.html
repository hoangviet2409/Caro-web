<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Caro Online</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .card {
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #f39c12;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #2ecc71;
        }

        .switch-btn {
            margin-top: 15px;
            font-size: 14px;
            color: #3498db;
            cursor: pointer;
            text-decoration: underline;
        }

        .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="card" id="loginForm">
        <h2>ĐĂNG NHẬP</h2>
        <input type="text" id="loginUser" placeholder="Tên đăng nhập">
        <input type="password" id="loginPass" placeholder="Mật khẩu">
        <button onclick="doLogin()">VÀO GAME</button>
        <div id="loginError" class="error"></div>
        <div class="switch-btn" onclick="toggleForm()">Chưa có tài khoản? Đăng ký ngay</div>
    </div>

    <div class="card" id="registerForm" style="display: none;">
        <h2>ĐĂNG KÝ</h2>
        <input type="text" id="regUser" placeholder="Tên đăng nhập mới">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPass" placeholder="Mật khẩu">
        <button onclick="doRegister()" style="background: #e67e22;">TẠO TÀI KHOẢN</button>
        <div id="regError" class="error"></div>
        <div class="switch-btn" onclick="toggleForm()">Quay lại Đăng nhập</div>
    </div>

    <script>
        const API_URL = "/api/auth";

        function toggleForm() {
            const login = document.getElementById('loginForm');
            const reg = document.getElementById('registerForm');
            login.style.display = (login.style.display === 'none') ? 'block' : 'none';
            reg.style.display = (reg.style.display === 'none') ? 'block' : 'none';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('regError').style.display = 'none';
        }

        async function doLogin() {
            const username = document.getElementById('loginUser').value;
            const password = document.getElementById('loginPass').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const res = await fetch(API_URL + "/signin", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("username", data.username);
                    window.location.href = "/lobby.html";
                } else {
                    errorDiv.innerText = "Sai tài khoản hoặc mật khẩu!";
                    errorDiv.style.display = "block";
                }
            } catch (e) {
                errorDiv.innerText = "Lỗi kết nối Server!"; errorDiv.style.display = "block";
            }
        }

        async function doRegister() {
            const username = document.getElementById('regUser').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            const errorDiv = document.getElementById('regError');

            try {
                const res = await fetch(API_URL + "/signup", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, email, password })
                });
                const text = await res.text();
                if (res.ok) {
                    alert("Đăng ký thành công! Vui lòng đăng nhập.");
                    toggleForm();
                }
                else { errorDiv.innerText = text; errorDiv.style.display = "block"; }
            } catch (e) { console.error(e); }
        }
    </script>
</body>

</html>
